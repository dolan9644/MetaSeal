name: 'Continuous Integration / Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # 允许创建 GitHub Release 并上传安装包

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORT_STRATEGY: download
          # macOS ad-hoc 签名：允许 Gatekeeper 放行未注册 Apple 开发者证书的应用
          APPLE_SIGNING_IDENTITY: '-'
        with:
          tagName: MetaSeal-v__VERSION__
          releaseName: 'MetaSeal Desktop App v__VERSION__'
          releaseBody: |
            ## MetaSeal v__VERSION__

            macOS 用户首次打开时，如遇到"已损坏"提示，请在终端执行：
            ```
            xattr -cr /Applications/MetaSeal.app
            ```
            或右键点击应用 → 选择"打开"。

            ### 下载指南
            - **Apple Silicon (M1/M2/M3)**: 下载 `MetaSeal_x.x.x_aarch64.dmg`
            - **Intel Mac**: 下载 `MetaSeal_x.x.x_x64.dmg`
            - **Windows**: 下载 `.msi` 安装包
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
